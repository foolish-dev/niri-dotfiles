# Gamemode config tuned for amd-pstate-epp + power-profiles-daemon
# on the ASUS ROG Flow Z13.
#
# Default `desiredgov=performance` fails on amd-pstate-epp because that
# driver only exposes `powersave` as the governor name — actual perf is
# controlled via EPP (energy_performance_preference), not the governor.
# So we leave governor switching unset and hand performance toggling
# to power-profiles-daemon, which drives EPP correctly.
[general]
desiredgov=
defaultgov=
ioprio=0
inhibit_screensaver=1
softrealtime=auto

[custom]
start=/usr/bin/powerprofilesctl set performance
end=/usr/bin/powerprofilesctl set balanced
