# pywal -- generated tmux colors
# Do not edit; regenerated by `wal` on every wallpaper change.
# Sourced from tmux.conf; reloaded live by the `wallpaper` script via
# `tmux source-file ~/.cache/wal/colors-tmux.conf` across all servers.

# Status bar
set -g status-style "bg={background},fg={foreground}"
set -g status-left "#[bg={color4},fg={background},bold]  #S #[bg={background},fg={color4}] "
set -g status-right "#[fg={color8}]#(whoami)@#H #[fg={color8}]| #[fg={color4}]%H:%M #[fg={color8}]| #[fg={color2}]%d-%b"

# Window status
setw -g window-status-format "#[fg={color8}] #I:#W "
setw -g window-status-current-format "#[bg={color0},fg={color4},bold] #I:#W "

# Pane borders
set -g pane-border-style "fg={color8}"
set -g pane-active-border-style "fg={color4}"

# Message + mode + popup
set -g message-style "bg={color0},fg={color4}"
set -g message-command-style "bg={color0},fg={color4}"
setw -g mode-style "bg={color8},fg={foreground}"
set -g popup-border-style "fg={color8}"
