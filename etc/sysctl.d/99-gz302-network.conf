# Network tuning for Strix Halo + MediaTek MT7925 WiFi on the GZ302.
#
# BBR (Bottleneck Bandwidth + RTT) is a congestion-control algorithm that
# outperforms `cubic` on lossy links and long-RTT paths -- typical WiFi
# territory. It paces packets based on measured bandwidth/RTT instead of
# reacting to packet loss, which avoids the throughput collapse cubic
# suffers under sporadic interference. The tcp_bbr module is autoloaded
# on first use by the sysctl mechanism.
net.ipv4.tcp_congestion_control = bbr

# fq_codel is already Arch's default; reaffirm so this drop-in is
# self-contained. fq_codel pairs cleanly with BBR's pacing.
net.core.default_qdisc = fq_codel
