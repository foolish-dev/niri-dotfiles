name: Lint

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          set -e
          # Enumerate shell scripts we actually want to lint: top-level *.sh
          # plus anything in .local/bin with a bash/sh shebang. Skip .zshrc
          # (zsh-specific parameter expansion that shellcheck can't parse)
          # and anything under .git/. Honors .shellcheckrc at the repo root.
          shopt -s nullglob
          targets=()
          for f in install.sh deploy.sh bootstrap.sh; do
            [[ -f "$f" ]] && targets+=("$f")
          done
          for f in .local/bin/*; do
            [[ -f "$f" ]] || continue
            if head -1 "$f" | grep -qE '^#!.*(bash|sh)$|^#!.*/env (bash|sh)'; then
              targets+=("$f")
            fi
          done
          echo "Linting ${#targets[@]} scripts:"
          printf '  %s\n' "${targets[@]}"
          echo
          shellcheck --severity=warning "${targets[@]}"
        shell: bash

  markdownlint:
    name: Markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@6b51ade7a9e4a75a7ad929842dd298a3804ebe8b # v23.1.0
        with:
          globs: |
            README.md
            **/*.md
            !**/node_modules/**

  svg-validate:
    name: SVG syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install libxml2-utils
        run: sudo apt-get update -qq && sudo apt-get install -y libxml2-utils

      - name: xmllint all SVGs
        run: |
          set -e
          shopt -s globstar nullglob
          fail=0
          for svg in **/*.svg; do
            if ! xmllint --noout "$svg" 2>/tmp/xmllint.err; then
              echo "::error file=$svg::$(cat /tmp/xmllint.err)"
              fail=1
            fi
          done
          exit $fail
        shell: bash
